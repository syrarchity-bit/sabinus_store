<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="Distribution region — Central and Eastern Europe">
  <rect width="520" height="360" rx="14" fill="#F3F5F2"/>
  <!-- abstract grid of served markets; not a literal political map -->
  <g font-family="monospace" font-size="11" fill="#5C6B79" letter-spacing="1">
    <!-- connecting lines from Slovakia hub -->
    <g stroke="#cfd6cf" stroke-width="1.4">
      <line x1="250" y1="170" x2="150" y2="96"/>
      <line x1="250" y1="170" x2="370" y2="92"/>
      <line x1="250" y1="170" x2="120" y2="210"/>
      <line x1="250" y1="170" x2="392" y2="178"/>
      <line x1="250" y1="170" x2="170" y2="286"/>
      <line x1="250" y1="170" x2="356" y2="282"/>
      <line x1="250" y1="170" x2="430" y2="250"/>
    </g>
    <!-- nodes -->
    <g fill="#2C8C9C">
      <circle cx="150" cy="96" r="5"/><circle cx="370" cy="92" r="5"/>
      <circle cx="120" cy="210" r="5"/><circle cx="392" cy="178" r="5"/>
      <circle cx="170" cy="286" r="5"/><circle cx="356" cy="282" r="5"/>
      <circle cx="430" cy="250" r="5"/>
    </g>
    <!-- hub -->
    <circle cx="250" cy="170" r="11" fill="#0F2C4D"/>
    <circle cx="250" cy="170" r="18" fill="none" stroke="#B0863C" stroke-width="1.6"/>
    <!-- labels -->
    <text x="150" y="84" text-anchor="middle">Poland</text>
    <text x="370" y="80" text-anchor="middle">Ukraine</text>
    <text x="104" y="226" text-anchor="middle">Czechia</text>
    <text x="402" y="170" text-anchor="start">Romania</text>
    <text x="170" y="306" text-anchor="middle">Hungary</text>
    <text x="356" y="302" text-anchor="middle">Bulgaria</text>
    <text x="430" y="270" text-anchor="middle">Moldova</text>
    <text x="250" y="150" text-anchor="middle" font-size="12" fill="#0F2C4D" font-weight="bold">SLOVAKIA</text>
    <text x="250" y="200" text-anchor="middle" font-size="9" fill="#B0863C">distribution hub</text>
  </g>
</svg>
